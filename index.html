<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chai-bot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: rgba(16, 20, 28, 0.72);
      --text: #e8edf5;
      --muted: #a7b3c5;
      --accent: #7dd3fc;
      --border: rgba(125, 211, 252, 0.22);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(165deg, rgba(7, 12, 20, 0.95), rgba(8, 10, 14, 0.92)),
        url("assets/chai.jpg") center/cover fixed no-repeat,
        var(--bg);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      padding: clamp(1.3rem, 2.8vw, 2.2rem);
    }
    .eyebrow {
      margin: 0 0 0.55rem;
      color: var(--accent);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    h1 {
      margin: 0;
      line-height: 1.15;
      font-size: clamp(1.55rem, 4vw, 2.25rem);
    }
    p {
      margin: 0.95rem 0 0;
      max-width: 64ch;
      color: var(--muted);
      line-height: 1.58;
      font-size: 1rem;
    }
    .support {
      margin-top: 1rem;
      color: var(--text);
      font-weight: 600;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace;
      background: rgba(12, 18, 28, 0.7);
      border: 1px solid rgba(125, 211, 252, 0.2);
      border-radius: 8px;
      padding: 0.1rem 0.45rem;
      color: #bfdbfe;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">chai-bot</p>
    <h1>chai-bot is an agentic system for the software development lifecycle.</h1>
    <p>It helps engineering teams find answers, plan work, and move software delivery forward with context-aware AI support.</p>
    <p class="support">Need help? Ask in <code>#ship-users</code> on Slack.</p>
  </main>
</body>
</html>
